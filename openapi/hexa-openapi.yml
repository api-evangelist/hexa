      - status
      - traceId
      type: object
      additionalProperties: false
    AgentChatMessageApiId:
      type: string
      format: uuid
      description: Unique ID for a Hex agent chat message in a thread.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ThreadResponseError:
      properties:
        type:
          type: string
        message:
          type: string
      required:
      - type
      - message
      type: object
      additionalProperties: false
    GetThreadResponseErrorBody:
      properties:
        status:
          type: string
          enum:
          - ERROR
          nullable: false
        messageId:
          $ref: '#/components/schemas/AgentChatMessageApiId'
        error:
          $ref: '#/components/schemas/ThreadResponseError'
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - status
      - messageId
      - error
      - traceId
      type: object
      additionalProperties: false
    Pick_CellApiResource.id-or-staticId-or-label_:
      properties:
        id:
          $ref: '#/components/schemas/CellId'
        staticId:
          $ref: '#/components/schemas/StaticCellId'
        label:
          type: string
          nullable: true
      required:
      - id
      - staticId
      - label
      type: object
      description: From T, pick a set of properties whose keys are in the union K
    Pick_ProjectApiResource.id_:
      properties:
        id:
          $ref: '#/components/schemas/ProjectId'
      required:
      - id
      type: object
      description: From T, pick a set of properties whose keys are in the union K
    AgentChatApiMessageContent:
      anyOf:
      - properties:
          text:
            type: string
            description: Markdown response from the agent.
          type:
            type: string
            enum:
            - text
            nullable: false
        required:
        - text
        - type
        type: object
      - properties:
          cell:
            $ref: '#/components/schemas/Pick_CellApiResource.id-or-staticId-or-label_'
            description: A cell the agent referenced in the response.
        required:
        - cell
        type: object
      - properties:
          project:
            $ref: '#/components/schemas/Pick_ProjectApiResource.id_'
            description: A project the agent referenced in the response.
        required:
        - project
        type: object
    GetThreadResponseIdleBody:
      properties:
        status:
          type: string
          enum:
          - IDLE
          nullable: false
        messageId:
          $ref: '#/components/schemas/AgentChatMessageApiId'
        response:
          items:
            $ref: '#/components/schemas/AgentChatApiMessageContent'
          type: array
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - status
      - messageId
      - response
      - traceId
      type: object
      additionalProperties: false
    GetThreadResponseResponseBody:
      anyOf:
      - $ref: '#/components/schemas/GetThreadResponseRunningBody'
      - $ref: '#/components/schemas/GetThreadResponseErrorBody'
      - $ref: '#/components/schemas/GetThreadResponseIdleBody'
    ListThreadsThreadTypeLabel:
      type: string
      description: User-facing label for the type of agent thread.
    ListThreadsSourceFilter:
      type: string
      enum:
      - HEX
      - SLACK
      - MCP
      - PUBLIC_API
      description: 'Filter for the source the first message of the thread came from.

        Use `HEX` for threads created via the Hex web app.'
    ListThreadsThreadResource:
      properties:
        id:
          $ref: '#/components/schemas/AgentChatThreadApiId'
          description: Id of the thread.
        orgId:
          type: string
          description: Id of the workspace the thread belongs to.
        userId:
          type: string
          nullable: true
          description: Id of the user that created the thread.
        title:
          type: string
          nullable: true
          description: Title of the thread, when available. Null for private threads.
        type:
          $ref: '#/components/schemas/ListThreadsThreadTypeLabel'
        source:
          $ref: '#/components/schemas/ListThreadsSourceFilter'
        url:
          type: string
          description: URL to view the thread in the Hex UI.
        createdAt:
          type: string
          description: ISO 8601 timestamp of when the thread was created.
        sensitive:
          type: boolean
          description: 'Whether the thread has been marked as sensitive. When `true`,

            the thread''s contents (such as title) are hidden from callers other than

            the thread author.'
      required:
      - id
      - orgId
      - userId
      - title
      - type
      - source
      - url
      - createdAt
      - sensitive
      type: object
      additionalProperties: false
    ListThreadsResponseBody:
      properties:
        values:
          items:
            $ref: '#/components/schemas/ListThreadsThreadResource'
          type: array
        pagination:
          properties:
            before:
              allOf:
              - $ref: '#/components/schemas/ApiPaginationCursor'
              nullable: true
              description: 'Cursor to the previous page of results, or null if there are no

                previous results.'
            after:
              allOf:
              - $ref: '#/components/schemas/ApiPaginationCursor'
              nullable: true
              description: Cursor to the next page of results, or null if there are no more.
          required:
          - before
          - after
          type: object
        traceId:
          $ref: '#/components/schemas/TraceId'
          description: Trace ID for debugging this request.
      required:
      - values
      - pagination
      - traceId
      type: object
      additionalProperties: false
    ContextSuggestionIssueId:
      type: string
      format: uuid
      description: Unique ID for a context suggestion issue.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ContextSuggestionIssueStatus:
      type: string
      enum:
      - OPEN
      - COMPLETED
      - DISMISSED
      - IN_PROGRESS
      - RESOLVED
    Suggestion:
      properties:
        id:
          $ref: '#/components/schemas/ContextSuggestionIssueId'
        title:
          type: string
          description: The title of the suggestion
        summary:
          type: string
          description: The summary of the suggestion
        status:
          $ref: '#/components/schemas/ContextSuggestionIssueStatus'
          description: The status of the suggestion
        createdDate:
          type: string
          format: date-time
          description: The date the suggestion was created
        lastSourceAddedDate:
          type: string
          format: date-time
          nullable: true
          description: The date the last source was added to the suggestion
      required:
      - id
      - title
      - summary
      - status
      - createdDate
      - lastSourceAddedDate
      type: object
      additionalProperties: false
    GetSuggestionsResponse:
      properties:
        values:
          items:
            $ref: '#/components/schemas/Suggestion'
          type: array
        pagination:
          $ref: '#/components/schemas/PaginationApiResource'
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - values
      - pagination
      - traceId
      type: object
      additionalProperties: false
    EnumValues_typeofListContextSuggestionIssuesSortByEnum_:
      type: string
      enum:
      - CREATED_DATE
      - EVIDENCE_COUNT
      - LAST_SOURCE_ADDED_DATE
    ListContextSuggestionIssuesSortByEnum:
      $ref: '#/components/schemas/EnumValues_typeofListContextSuggestionIssuesSortByEnum_'
    SuggestionSource:
      properties:
        warning:
          properties:
            summary:
              type: string
              description: The summary of the warning
            warningType:
              type: string
              description: The type of warning, one of user_doubt, missing_context, data_limitation, or other
          required:
          - summary
          - warningType
          type: object
          nullable: true
        agentChatThread:
          properties:
            intent:
              type: string
              nullable: true
              description: Summary of the intent of the agent chat thread
            user:
              properties:
                name:
                  type: string
                  nullable: true
                id:
                  type: string
              required:
              - name
              - id
              type: object
              nullable: true
              description: The user that the agent chat thread is associated with
            title:
              type: string
              nullable: true
              description: The title of the agent chat thread
            id:
              type: string
          required:
          - intent
          - user
          - title
          - id
          type: object
          nullable: true
          description: The agent chat thread that the warning is associated with
      required:
      - warning
      - agentChatThread
      type: object
      additionalProperties: false
    ContextSuggestionDataWarehouseUpdateId:
      type: string
      format: uuid
      description: Unique ID for a proposed data warehouse update within a context suggestion.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ContextSuggestionFileUpdateId:
      type: string
      format: uuid
      description: Unique ID for a proposed file update within a context suggestion.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    SuggestionUpdateType:
      type: string
      enum:
      - FILE_UPDATE
      - DATA_WAREHOUSE_UPDATE
    ContextSuggestionUpdateStatus:
      type: string
      enum:
      - COMPLETED
      - DISMISSED
      - NEEDS_REVIEW
      - STALE
    EnumValues_typeofContextSuggestionDataWarehouseUpdateType_:
      type: string
      enum:
      - UPDATE_DESCRIPTION
      - UPDATE_STATUS
    ContextSuggestionDataWarehouseUpdateType:
      $ref: '#/components/schemas/EnumValues_typeofContextSuggestionDataWarehouseUpdateType_'
    MetadataDescriptions:
      properties:
        hexDescription:
          type: string
          nullable: true
          description: The Hex-managed description
        warehouseComment:
          type: string
          nullable: true
          description: The warehouse comment
        dbtDescription:
          type: string
          nullable: true
          description: The dbt description
      required:
      - hexDescription
      - warehouseComment
      - dbtDescription
      type: object
      additionalProperties: false
    DataWarehouseUpdatePayload:
      properties:
        updateType:
          $ref: '#/components/schemas/ContextSuggestionDataWarehouseUpdateType'
          description: The type of data warehouse update, one of UPDATE_DESCRIPTION or UPDATE_STATUS
        dataConnectionName:
          type: string
          nullable: true
          description: The name of the data connection this resource belongs to
        databaseName:
          type: string
          nullable: true
          description: The database name. Null for warehouse types that don't use a database segment (e.g. some Postgres connections).
        schemaName:
          type: string
          nullable: true
          description: The schema name
        tableName:
          type: string
          nullable: true
          description: The table name
        columnName:
          type: string
          nullable: true
          description: The column name, if this is a column-level update
        descriptionUpdate:
          properties:
            newDescription:
              type: string
              nullable: true
              description: The proposed new description
            currentDescriptions:
              $ref: '#/components/schemas/MetadataDescriptions'
              description: The current descriptions from various sources
          required:
          - newDescription
          - currentDescriptions
          type: object
          nullable: true
          description: Present when updateType is UPDATE_DESCRIPTION. Contains the current and proposed descriptions.
        statusUpdate:
          properties:
            newStatusName:
              type: string
              nullable: true
              description: The proposed new status name
            currentStatusName:
              type: string
              nullable: true
              description: The current status name, if any
          required:
          - newStatusName
          - currentStatusName
          type: object
          nullable: true
          description: Present when updateType is UPDATE_STATUS. Contains the current and proposed status names.
      required:
      - updateType
      - dataConnectionName
      - databaseName
      - schemaName
      - tableName
      - columnName
      - descriptionUpdate
      - statusUpdate
      type: object
      additionalProperties: false
    FileUpdateType:
      type: string
      enum:
      - CREATE_ORG_GUIDE_FILE
      - EDIT_ORG_GUIDE_FILE
      - EDIT_WORKSPACE_RULES
    FileUpdatePayload:
      properties:
        updateType:
          $ref: '#/components/schemas/FileUpdateType'
          description: 'The type of guide update, e.g. CREATE_ORG_GUIDE_FILE, EDIT_ORG_GUIDE_FILE, EDIT_WORKSPACE_RULES.

            New values may be added to this enum in the future.'
        filePath:
          type: string
          description: The file path for the guide update
        diff:
          type: string
          description: The Aider text diff of the changes
      required:
      - updateType
      - filePath
      - diff
      type: object
      additionalProperties: false
    ProposedChange:
      properties:
        id:
          anyOf:
          - $ref: '#/components/schemas/ContextSuggestionDataWarehouseUpdateId'
          - $ref: '#/components/schemas/ContextSuggestionFileUpdateId'
          description: The unique identifier of the proposed change
        updateType:
          $ref: '#/components/schemas/SuggestionUpdateType'
          description: The type of change, either "FILE_UPDATE" or "DATA_WAREHOUSE_UPDATE"
        status:
          $ref: '#/components/schemas/ContextSuggestionUpdateStatus'
          description: The review status of the proposed change, one of NEEDS_REVIEW, ACCEPTED, REJECTED, STALE, or RESOLVED_EXTERNALLY
        payload:
          anyOf:
          - $ref: '#/components/schemas/DataWarehouseUpdatePayload'
          - $ref: '#/components/schemas/FileUpdatePayload'
          description: The contents of the proposed change
      required:
      - id
      - updateType
      - status
      - payload
      type: object
      additionalProperties: false
    GetSuggestionResponse:
      properties:
        id:
          $ref: '#/components/schemas/ContextSuggestionIssueId'
        title:
          type: string
          description: The title of the suggestion
        summary:
          type: string
          description: The summary of the suggestion
        status:
          $ref: '#/components/schemas/ContextSuggestionIssueStatus'
          description: The status of the suggestion
        createdDate:
          type: string
          format: date-time
          description: The date the suggestion was created
        lastSourceAddedDate:
          type: string
          format: date-time
          nullable: true
          description: The date the last source was added to the suggestion
        sources:
          items:
            $ref: '#/components/schemas/SuggestionSource'
          type: array
        proposedChanges:
          items:
            $ref: '#/components/schemas/ProposedChange'
          type: array
      required:
      - id
      - title
      - summary
      - status
      - createdDate
      - lastSourceAddedDate
      - sources
      - proposedChanges
      type: object
      additionalProperties: false
    UpdateSuggestionResponse:
      properties:
        suggestion:
          $ref: '#/components/schemas/Suggestion'
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - suggestion
      - traceId
      type: object
      additionalProperties: false
    UpdateSuggestionBody:
      properties:
        status:
          $ref: '#/components/schemas/ContextSuggestionIssueStatus'
          description: The status to update the suggestion to
        rejectionReason:
          type: string
          nullable: true
          description: The reason for the rejection if status is dismissed
      required:
      - status
      - rejectionReason
      type: object
      additionalProperties: false
    TriggerSuggestionReviewResponse:
      properties:
        suggestion:
          $ref: '#/components/schemas/Suggestion'
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - suggestion
      - traceId
      type: object
      additionalProperties: false
    UpdateSuggestionUpdateResponse:
      properties:
        suggestionUpdate:
          properties:
            rejectionReason:
              type: string
              nullable: true
            status:
              $ref: '#/components/schemas/ContextSuggestionUpdateStatus'
            id:
              type: string
          required:
          - rejectionReason
          - status
          - id
          type: object
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - suggestionUpdate
      - traceId
      type: object
      additionalProperties: false
    UpdateSuggestionUpdateBody:
      properties:
        updateTarget:
          $ref: '#/components/schemas/SuggestionUpdateType'
          description: The target of the update
        status:
          $ref: '#/components/schemas/ContextSuggestionUpdateStatus'
          description: The status to update the suggestion update to
        rejectionReason:
          type: string
          nullable: true
          description: The reason for the rejection if status is dismissed
      required:
      - updateTarget
      - status
      - rejectionReason
      type: object
      additionalProperties: false
    EnumValues_typeofCellType_:
      type: string
      enum:
      - CODE
      - MARKDOWN
      - DISPLAY_TABLE
      - INPUT
      - SQL
      - VEGA_CHART
      - CELL_GROUP
      - METRIC
      - TEXT
      - MAP
      - WRITEBACK
      - DBT_METRIC
      - PIVOT
      - FILTER
      - COMPONENT_IMPORT
      - CHART
      - BLOCK
      - EXPLORE
      - COLLAPSIBLE
    CellType:
      $ref: '#/components/schemas/EnumValues_typeofCellType_'
    CellApiResource:
      properties:
        id:
          $ref: '#/components/schemas/CellId'
        staticId:
          $ref: '#/components/schemas/StaticCellId'
        cellType:
          $ref: '#/components/schemas/CellType'
        label:
          type: string
          nullable: true
        dataConnectionId:
          allOf:
          - $ref: '#/components/schemas/DataConnectionId'
          nullable: true
        contents:
          properties:
            markdownCell:
              properties:
                source:
                  type: string
              required:
              - source
              type: object
              nullable: true
            sqlCell:
              properties:
                outputDataframe:
                  type: string
                source:
                  type: string
              required:
              - outputDataframe
              - source
              type: object
              nullable: true
            codeCell:
              properties:
                source:
                  type: string
              required:
              - source
              type: object
              nullable: true
          required:
          - markdownCell
          - sqlCell
          - codeCell
          type: object
        projectId:
          $ref: '#/components/schemas/ProjectId'
      required:
      - id
      - staticId
      - cellType
      - label
      - dataConnectionId
      - contents
      - projectId
      type: object
      additionalProperties: false
    CellsListApiResource:
      properties:
        values:
          items:
            $ref: '#/components/schemas/CellApiResource'
          type: array
        pagination:
          $ref: '#/components/schemas/PaginationApiResource'
      required:
      - values
      - pagination
      type: object
      additionalProperties: false
    CellRunResponsePayload:
      properties:
        cellId:
          $ref: '#/components/schemas/CellId'
        runId:
          allOf:
          - $ref: '#/components/schemas/ResponseRunId'
          nullable: true
          description: The run ID. Null when dryRun is true.
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
        runUrl:
          allOf:
          - $ref: '#/components/schemas/RunUrl'
          nullable: true
          description: URL to view the run. Null when dryRun is true.
        runStatusUrl:
          allOf:
          - $ref: '#/components/schemas/RunStatusUrl'
          nullable: true
          description: URL to check run status. Null when dryRun is true.
        traceId:
          $ref: '#/components/schemas/TraceId'
        dryRun:
