components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    EmbeddingResponse:
      properties:
        url:
          type: string
      required:
      - url
      type: object
      additionalProperties: false
    TraceId:
      type: string
      description: A unique identifier for this API request. The Hex Support team may request this value when debugging an
        issue.
    TsoaErrorResponsePayload:
      properties:
        details:
          type: string
        traceId:
          $ref: '#/components/schemas/TraceId'
        reason:
          type: string
      required:
      - reason
      type: object
    EmbeddingRequest:
      properties:
        hexUserAttributes:
          properties: {}
          additionalProperties:
            type: string
          type: object
          description: A map of attributes meant to populate hex_user_attributes in the app for the running user. This must
            be a string to string map. For more complexity, you can do json serialization
          example:
            orgId: my-org-id
            groupId: my-group-id
        scope:
          items:
            type: string
          type: array
          description: 'Optionally include additional permissions for a user to do in an embedded app. Valid scopes include:


            EXPORT_PDF: allow users to download the app as a pdf

            EXPORT_CSV: allow users to download CSVs from tables'
        inputParameters:
          properties: {}
          additionalProperties: {}
          type: object
          description: Optionall sets default values for input states. The keys are the names of the inputs and the values
            are the default values for those inputs.
        expiresIn:
          type: number
          format: double
          description: 'Optionally specify the expiration time of the embedding url in milliseconds.

            This represents the maximum allowed time between receiving the API response with the single-use signed URL, and
            requesting the signed URL for the iframe.

            Default is 15 seconds. Maximum value is 300 seconds (5 minutes).'
          default: '15000'
        displayOptions:
          properties:
            theme:
              type: string
              enum:
              - light
              - dark
            showEmbeddedRunButton:
              type: boolean
              description: The showEmbeddedRunButton parameter will ensure the run button always shows up in the embedded
                app navbar
            noEmbedHeaderPadding:
              type: boolean
              description: The noEmbedHeaderPadding parameter removes the top padding added to apps with no tabs.
            noEmbedBasePadding:
              type: boolean
              description: The noEmbedBasePadding parameter removes the padding around the embedded app container
            noEmbedOutline:
              type: boolean
              description: The noEmbedOutline parameter removes the border around the embedded app
            noEmbedFooter:
              type: boolean
              description: The noEmbedFooter parameter removes the Hex-branded footer at the bottom of the embedded app
          additionalProperties: {}
          type: object
          description: Optionally customize the display of the embedded app
        testMode:
          type: boolean
          description: Run the embed API call in test mode. Does not run the app and will not count towards rate limits or
            embedding usage counts.
      type: object
      additionalProperties: {}
    ProjectId:
      type: string
      format: uuid
      description: Unique ID for a Hex project. This can be found in the Variables side bar of the Logic View of a project,
        or by visiting the Project, and copying the UUID after `hex` in the URL.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    EnumValues_typeofProjectTypeApiEnum_:
      type: string
      enum:
      - PROJECT
      - COMPONENT
    ProjectTypeApiEnum:
      $ref: '#/components/schemas/EnumValues_typeofProjectTypeApiEnum_'
      description: The type of the ProjectApiResource being returned.
    Timestamp:
      type: string
      format: timestamp
      description: An ISO 8601 timestamp with timezone like 1970-01-01T00:00:00Z.
    EnumValues_typeofScheduleCadenceApiEnum_:
      type: string
      enum:
      - HOURLY
      - DAILY
      - WEEKLY
      - MONTHLY
      - CUSTOM
    ScheduleCadenceApiEnum:
      $ref: '#/components/schemas/EnumValues_typeofScheduleCadenceApiEnum_'
      description: Types of cadence of a schedule for a Hex project.
    TimezoneDesignator:
      type: string
      description: An ISO 8601 timezone designator like +08:00.
    EnumValues_typeofDayOfWeekApiEnum_:
      type: string
      enum:
      - SUNDAY
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
    DayOfWeekApiEnum:
      $ref: '#/components/schemas/EnumValues_typeofDayOfWeekApiEnum_'
    ScheduleApiResource:
      properties:
        cadence:
          $ref: '#/components/schemas/ScheduleCadenceApiEnum'
        enabled:
          type: boolean
        hourly:
          properties:
            timezone:
              $ref: '#/components/schemas/TimezoneDesignator'
            minute:
              type: integer
              format: int32
              minimum: 0
              maximum: 59
          required:
          - timezone
          - minute
          type: object
          nullable: true
        daily:
          properties:
            timezone:
              $ref: '#/components/schemas/TimezoneDesignator'
            minute:
              type: integer
              format: int32
              minimum: 0
              maximum: 59
            hour:
              type: integer
              format: int32
              minimum: 0
              maximum: 23
          required:
          - timezone
          - minute
          - hour
          type: object
          nullable: true
        weekly:
          properties:
            timezone:
              $ref: '#/components/schemas/TimezoneDesignator'
            minute:
              type: integer
              format: int32
              minimum: 0
              maximum: 59
            hour:
              type: integer
              format: int32
              minimum: 0
              maximum: 23
            dayOfWeek:
              $ref: '#/components/schemas/DayOfWeekApiEnum'
          required:
          - timezone
          - minute
          - hour
          - dayOfWeek
          type: object
          nullable: true
        monthly:
          properties:
            timezone:
              $ref: '#/components/schemas/TimezoneDesignator'
            minute:
              type: integer
              format: int32
              minimum: 0
              maximum: 59
            hour:
              type: integer
              format: int32
              minimum: 0
              maximum: 23
            day:
              type: integer
              format: int32
              minimum: 1
              maximum: 28
          required:
          - timezone
          - minute
          - hour
          - day
          type: object
          nullable: true
        custom:
          properties:
            timezone:
              $ref: '#/components/schemas/TimezoneDesignator'
            cron:
              type: string
          required:
          - timezone
          - cron
          type: object
          nullable: true
      required:
      - cadence
      - enabled
      - hourly
      - daily
      - weekly
      - monthly
      - custom
      type: object
      additionalProperties: false
    EnumValues_typeofAccessLevelEnum_:
      type: string
      enum:
      - NONE
      - APP_ONLY
      - CAN_VIEW
      - CAN_EDIT
      - FULL_ACCESS
    AccessLevelEnum:
      $ref: '#/components/schemas/EnumValues_typeofAccessLevelEnum_'
      description: 'Access level granted by sharing endpoints.

        For projects, `CAN_VIEW` is the API value that corresponds to the UI permission labeled "Can explore".

        `APP_ONLY` is the API value that corresponds to the UI permission labeled "Can view app".'
    SharingResource:
      properties:
        users:
          items:
            properties:
              access:
                $ref: '#/components/schemas/AccessLevelEnum'
              user:
                properties:
                  email:
                    type: string
                required:
                - email
                type: object
            required:
            - access
            - user
            type: object
          type: array
        collections:
          items:
            properties:
              access:
                $ref: '#/components/schemas/AccessLevelEnum'
              collection:
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
            required:
            - access
            - collection
            type: object
          type: array
        groups:
          items:
            properties:
              access:
                $ref: '#/components/schemas/AccessLevelEnum'
              group:
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
            required:
            - access
            - group
            type: object
          type: array
        workspace:
          properties:
            access:
              $ref: '#/components/schemas/AccessLevelEnum'
          required:
          - access
          type: object
        publicWeb:
          properties:
            access:
              $ref: '#/components/schemas/AccessLevelEnum'
          required:
          - access
          type: object
        support:
          properties:
            access:
              $ref: '#/components/schemas/AccessLevelEnum'
          required:
          - access
          type: object
      required:
      - users
      - collections
      - groups
      - workspace
      - publicWeb
      - support
      type: object
      additionalProperties: false
    ProjectApiResource:
      properties:
        id:
          $ref: '#/components/schemas/ProjectId'
        title:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/ProjectTypeApiEnum'
        creator:
          properties:
            email:
              type: string
          required:
          - email
          type: object
        owner:
          properties:
            email:
              type: string
          required:
          - email
          type: object
        status:
          properties:
            name:
              type: string
          required:
          - name
          type: object
          nullable: true
        categories:
          items:
            properties:
              description:
                type: string
                nullable: true
              name:
                type: string
            required:
            - description
            - name
            type: object
          type: array
        reviews:
          properties:
            required:
              type: boolean
          required:
          - required
          type: object
        analytics:
          properties:
            publishedResultsUpdatedAt:
              allOf:
              - $ref: '#/components/schemas/Timestamp'
              nullable: true
            lastViewedAt:
              allOf:
              - $ref: '#/components/schemas/Timestamp'
              nullable: true
            appViews:
              properties:
                lastThirtyDays:
                  type: integer
                  format: int32
                lastFourteenDays:
                  type: integer
                  format: int32
                lastSevenDays:
                  type: integer
                  format: int32
                allTime:
                  type: integer
                  format: int32
              required:
              - lastThirtyDays
              - lastFourteenDays
              - lastSevenDays
              - allTime
              type: object
          required:
          - publishedResultsUpdatedAt
          - lastViewedAt
          - appViews
          type: object
        lastEditedAt:
          $ref: '#/components/schemas/Timestamp'
        lastPublishedAt:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          nullable: true
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        archivedAt:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          nullable: true
        trashedAt:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          nullable: true
        schedules:
          items:
            $ref: '#/components/schemas/ScheduleApiResource'
          type: array
        sharing:
          $ref: '#/components/schemas/SharingResource'
      required:
      - id
      - title
      - description
      - type
      - creator
      - owner
      - status
      - categories
      - reviews
      - analytics
      - lastEditedAt
      - lastPublishedAt
      - createdAt
      - archivedAt
      - trashedAt
      - schedules
      type: object
      additionalProperties: false
    ResponseRunId:
      type: string
      format: uuid
      description: Unique ID for a run of a Hex project
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ProjectRunStatus:
      description: Current status of a project run
      enum:
      - PENDING
      - RUNNING
      - ERRORED
      - COMPLETED
      - KILLED
      - UNABLE_TO_ALLOCATE_KERNEL
      type: string
    RunUrl:
      type: string
      description: URL to view the current progress of the project run in the Hex UI
    NotebookProjectRunResponsePayload:
      properties:
        projectId:
          $ref: '#/components/schemas/ProjectId'
        runId:
          $ref: '#/components/schemas/ResponseRunId'
        status:
          $ref: '#/components/schemas/ProjectRunStatus'
        url:
          $ref: '#/components/schemas/RunUrl'
        traceId:
          $ref: '#/components/schemas/TraceId'
      required:
      - projectId
      - runId
      - status
      - url
      - traceId
      type: object
      additionalProperties: false
    ExportProjectApiResource:
      properties:
        filename:
          type: string
        content:
          type: string
      required:
      - filename
      - content
      type: object
      additionalProperties: false
    ProjectVersionId:
      type: string
      format: uuid
      description: Unique ID for a Hex project version.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    CellId:
      type: string
      format: uuid
      description: Unique ID for a cell. This can be found by going into the menu of a cell in the notebook.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ImportProjectWarningsApiResource:
      properties:
        categories:
          items:
            type: string
          type: array
          nullable: true
        components:
          items:
            properties:
              version:
                type: string
              componentId:
                type: string
            required:
            - version
            - componentId
            type: object
          type: array
          nullable: true
        status:
          type: string
          nullable: true
        projectSecrets:
          items:
            type: string
          type: array
          nullable: true
        sharedSecrets:
          items:
            type: string
          type: array
          nullable: true
        projectDataConnectionIds:
          items:
            type: string
          type: array
          nullable: true
        sharedDataConnections:
          items:
            type: string
          type: array
          nullable: true
        sharedVcsPackages:
          items:
            type: string
          type: array
          nullable: true
        projectTitle:
          type: string
          nullable: true
        projectLanguage:
          type: string
          nullable: true
        cellIds:
          items:
            $ref: '#/components/schemas/CellId'
          type: array
          nullable: true
        appLayout:
          items:
            type: string
          type: array
          nullable: true
        timezones:
          items:
            type: string
          type: array
          nullable: true
        externalFileIntegrations:
          items:
            type: string
          type: array
          nullable: true
        exportedHexType:
          type: string
          nullable: true
        semanticProjects:
          items:
            type: string
          type: array
          nullable: true
      required:
      - categories
      - components
      - status
      - projectSecrets
      - sharedSecrets
      - projectDataConnectionIds
      - sharedDataConnections
      - sharedVcsPackages
      - projectTitle
      - projectLanguage
      - cellIds
      - appLayout
      - timezones
      - externalFileIntegrations
      - exportedHexType
      - semanticProjects
      type: object
      additionalProperties: false
    ImportProjectApiResource:
      properties:
        projectId:
          $ref: '#/components/schemas/ProjectId'
        hexVersionId:
          $ref: '#/components/schemas/ProjectVersionId'
        warnings:
          $ref: '#/components/schemas/ImportProjectWarningsApiResource'
      required:
      - projectId
      - hexVersionId
      - warnings
      type: object
      additionalProperties: false
    ApiPaginationCursor:
      type: string
      description: 'A cursor string used with `before` and `after` parameters to paginate through a list

        of items on the API.'
    PaginationApiResource:
      properties:
        after:
          allOf:
          - $ref: '#/components/schemas/ApiPaginationCursor'
          nullable: true
        before:
          allOf:
          - $ref: '#/components/schemas/ApiPaginationCursor'
          nullable: true
      required:
      - after
      - before
      type: object
      additionalProperties: false
    ProjectsListApiResource:
      properties:
        values:
          items:
            $ref: '#/components/schemas/ProjectApiResource'
          type: array
        pagination:
          $ref: '#/components/schemas/PaginationApiResource'
      required:
      - values
      - pagination
      type: object
      additionalProperties: false
    PageSize:
      type: integer
      format: int32
      default: '25'
      description: Number of results to fetch per page for paginated requests
      minimum: 1
      maximum: 100
    EnumValues_typeofSortByEnum_:
      type: string
      enum:
      - CREATED_AT
      - LAST_EDITED_AT
      - LAST_PUBLISHED_AT
    SortByEnum:
      $ref: '#/components/schemas/EnumValues_typeofSortByEnum_'
    EnumValues_typeofSortDirectionEnum_:
      type: string
      enum:
      - DESC
      - ASC
    SortDirectionEnum:
      $ref: '#/components/schemas/EnumValues_typeofSortDirectionEnum_'
    DataConnectionId:
      type: string
      format: uuid
      description: Unique ID for a data connection.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ProjectQueriedTableResource:
      properties:
        dataConnectionId:
          $ref: '#/components/schemas/DataConnectionId'
        dataConnectionName:
          type: string
        tableName:
          type: string
      required:
      - dataConnectionId
      - dataConnectionName
      - tableName
      type: object
      additionalProperties: false
    ProjectQueriedTablesApiResource:
      properties:
        values:
          items:
            $ref: '#/components/schemas/ProjectQueriedTableResource'
          type: array
        pagination:
          $ref: '#/components/schemas/PaginationApiResource'
        traceId:
          type: string
      required:
      - values
      - pagination
      - traceId
      type: object
      additionalProperties: false
    CollectionId:
      type: string
      format: uuid
      description: Unique ID for a collection.
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ShareProjectWithCollectionError:
      properties:
        collectionIds:
          items:
            $ref: '#/components/schemas/CollectionId'
          type: array
        reason:
          type: string
      required:
      - collectionIds
      - reason
      type: object
      additionalProperties: false
    EditProjectSharingCollectionsResponse:
      properties:
        project:
          $ref: '#/components/schemas/ProjectApiResource'
        errors:
          items:
            $ref: '#/components/schemas/ShareProjectWithCollectionError'
          type: array
      required:
      - project
      type: object
      additionalProperties: false
    ShareProjectWithWorkspaceError:
      properties:
        type:
          type: string
          enum:
          - workspace
          - publicWeb
        reason:
          type: string
      required:
      - type
      - reason
      type: object
      additionalProperties: false
    EditProjectSharingWorkspaceAndPublicResponse:
      properties:
        project:
          $ref: '#/components/schemas/ProjectApiResource'
        errors:
          items:
            $ref: '#/components/schemas/ShareProjectWithWorkspaceError'
          type: array
      required:
      - project
      type: object
      additionalProperties: false
    PublicWebAccessLevel:
      $ref: '#/components/schemas/EnumValues_typeofAccessLevelEnum_'
    GroupId:
      type: string
      format: uuid
      description: Unique ID for a group. This can be found from the groups page (in Settings).
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ShareProjectWithGroupError:
      properties:
        groupIds:
          items:
            $ref: '#/components/schemas/GroupId'
          type: array
        reason:
          type: string
      required:
      - groupIds
      - reason
      type: object
      additionalProperties: false
    EditProjectSharingGroupsResponse:
      properties:
        project:
          $ref: '#/components/schemas/ProjectApiResource'
        errors:
          items:
            $ref: '#/components/schemas/ShareProjectWithGroupError'
          type: array
      required:
      - project
      type: object
      additionalProperties: false
    UserId:
      type: string
      format: uuid
      description: Unique ID for a user. This can be found from the users page (in Settings).
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    ShareProjectWithUserError:
      properties:
        userIds:
          items:
            $ref: '#/components/schemas/UserId'
          type: array
        reason:
          type: string
      required:
      - userIds
      - reason
      type: object
      additionalProperties: false
    EditProjectSharingUsersResponse:
      properties:
        project:
          $ref: '#/components/schemas/ProjectApiResource'
        errors:
          items:
            $ref: '#/components/schemas/ShareProjectWithUserError'
          type: array
      required:
      - project
      type: object
      additionalProperties: false
    ProblemSeverity:
      type: string
      enum:
      - fatal
      - error
      - warning
    ProblemMessage:
      type: string
    ProblemKeyPath:
      items:
        anyOf:
        - type: string
        - type: number
          format: double
      type: array
    HexSLTypes.PublicProblem:
      description: A problem encountered during the import of a public HexSL project.
      properties:
        severity:
          $ref: '#/components/schemas/ProblemSeverity'
        message:
          $ref: '#/components/schemas/ProblemMessage'
        cause_paths:
          items:
            $ref: '#/components/schemas/ProblemKeyPath'
          type: array
        impact_paths:
          items:
            $ref: '#/components/schemas/ProblemKeyPath'
          type: array
        validated_by_json_schema:
          type: boolean
      required:
      - severity
      - message
      - cause_paths
      - impact_paths
      type: object
      additionalProperties: false
    HexSLProblemWithDisplay:
      allOf:
      - $ref: '#/components/schemas/HexSLTypes.PublicProblem'
      - properties:
          display:
            type: string
        required:
        - display
        type: object
    Record_string.Record_string.HexSLTypes.DataType__:
      properties: {}
      type: object
      description: Construct a type with a set of properties K of type T
    MetricflowModelSchemas:
      $ref: '#/components/schemas/Record_string.Record_string.HexSLTypes.DataType__'
    SemanticProjectsSyncResponsePayload:
      properties:
        traceId:
          type: string
        contents:
          items:
            type: string
          type: array
        warnings:
          items:
            type: string
          type: array
        skipped:
          properties: {}
          additionalProperties: {}
          type: object
        problems:
          items:
            $ref: '#/components/schemas/HexSLProblemWithDisplay'
          type: array
        debug:
          properties:
            metricflowModelSchemas:
              $ref: '#/components/schemas/MetricflowModelSchemas'
          type: object
      required:
      - traceId
      - contents
      type: object
      additionalProperties: false
    SemanticProjectId:
      type: string
      format: uuid
      description: 'Unique ID for a Hex semantic project. This can be found from the semantic

        projects admin panel (in Settings).'
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    UpdateSemanticProjectResponse:
      description: Response body for successful status updates
      properties:
        updated:
          properties:
            views:
              items:
                properties:
                  status:
                    type: string
                    nullable: true
                  name:
                    type: string
                required:
                - status
                - name
                type: object
              type: array
            datasets:
              items:
                properties:
                  status:
                    type: string
                    nullable: true
                  name:
                    type: string
                required:
                - status
                - name
                type: object
              type: array
          required:
          - views
          - datasets
          type: object
      required:
      - updated
      type: object
      additionalProperties: false
    SemanticObjectUpdate:
      description: 'A single update for a semantic object (dataset or view)

        Currently, only status updates are supported.'
      properties:
        type:
          type: string
          enum:
          - DATASET
          - VIEW
          description: The type of object to update
        name:
          type: string
          description: The name of the dataset or view
        status:
          type: string
          nullable: true
          description: The status name to apply, or null to remove the current status
      required:
      - type
      - name
      - status
      type: object
      additionalProperties: false
    UpdateSemanticProjectRequest:
      description: 'Request body for updating semantic datasets and views

        Currently, only status updates are supported.'
      properties:
        updates:
          items:
            $ref: '#/components/schemas/SemanticObjectUpdate'
          type: array
          description: Array of updates to apply
      required:
      - updates
      type: object
      additionalProperties: false
