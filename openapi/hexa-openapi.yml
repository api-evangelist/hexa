      type: object
      additionalProperties: false
    RunProjectRequestBody:
      description: Request body format for triggering a project run
      properties:
        inputParams:
          properties: {}
          additionalProperties: {}
          type: object
          description: 'Optionally specify input parameters for this project run.

            These should be structured as a dictionary of key/value pairs, where the key name matches the name of the variable
            in the Hex project.


            Only parameters that are added to the published app can be set via this request parameter. Any additional inputs
            will be ignored.

            It is invalid to pass in both a viewId and inputParams.


            If no input parameters are provided, the project will be run with the default input values.

            Note that if input parameters are provided, this run will not be able to update the cached values for the project,
            and the updateCache setting (below) will be ignored.'
          example:
            text_input_1: Hello World
            numeric_input_1: 123
        dryRun:
          type: boolean
          description: When true, this endpoint will perform a dry run that does not run the project. This can be useful for
            validating the structure of an API call, and inspecting a dummy response, without running a project.
          default: 'false'
        updateCache:
          type: boolean
          deprecated: true
        notifications:
          items:
            $ref: '#/components/schemas/ProjectRunNotification'
          type: array
          description: 'Optionally specify a list of notification details that will be delivered once a project run completes.

            Notifications can be configured for delivery to Slack channels, Hex users, or Hex groups.'
          example:
          - type: ALL
            includeSuccessScreenshot: 'true'
            slackChannelIds:
            - C0000000
            userIds:
            - uuid-user-1
            - uuid-user-2
          - type: FAILURE
            includeSuccessScreenshot: 'false'
            userIds:
            - uuid-user-1
            groupIds:
            - uuid-group-1
        updatePublishedResults:
          type: boolean
          description: 'When true, the cached state of the published app will be updated with the latest

            run results. You must have at least "Can Edit" permissions on the project to do so.

            Note: this cannot be set to true if custom input parameters are provided.'
          default: 'false'
        useCachedSqlResults:
          type: boolean
          description: 'When false, the project will run without using any cached SQL results, and will

            update those cached SQL results.'
          default: 'true'
        viewId:
          type: string
          description: 'Optionally specify a SavedView viewId to use for the project run. If specified, the saved view''s
            inputs will be used for the project run.

            It is invalid to pass in both a viewId and inputParams.

            If not specified, the default inputs will be used.'
      type: object
      additionalProperties: false
