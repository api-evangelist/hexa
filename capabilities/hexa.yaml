      name: v1-cells
      description: REST surface for v1-cells.
      operations:
      - method: GET
        name: listcells
        description: List all cells
        call: hexa.listcells
        with:
          projectId: rest.projectId
          limit: rest.limit
          after: rest.after
          before: rest.before
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcell
        description: Create a new cell
        call: hexa.createcell
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/cells/{cellid}
      name: v1-cells-cellid
      description: REST surface for v1-cells-cellId.
      operations:
      - method: GET
        name: getcell
        description: Get a single cell by ID
        call: hexa.getcell
        with:
          cellId: rest.cellId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecell
        description: Update a cell's source and/or data connection
        call: hexa.updatecell
        with:
          cellId: rest.cellId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecell
        description: Delete a cell
        call: hexa.deletecell
        with:
          cellId: rest.cellId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/cells/{cellid}/image
      name: v1-cells-cellid-image
      description: REST surface for v1-cells-cellId-image.
      operations:
      - method: GET
        name: getchartimagefromlogic
        description: Get the rendered PNG image of a chart cell from the current notebook session by cellId.
        call: hexa.getchartimagefromlogic
        with:
          cellId: rest.cellId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/collections
      name: v1-collections
      description: REST surface for v1-collections.
      operations:
      - method: GET
        name: listcollections
        description: listcollections
        call: hexa.listcollections
        with:
          after: rest.after
          before: rest.before
          limit: rest.limit
          sortBy: rest.sortBy
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcollection
        description: createcollection
        call: hexa.createcollection
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/collections/{collectionid}
      name: v1-collections-collectionid
      description: REST surface for v1-collections-collectionId.
      operations:
      - method: GET
        name: getcollection
        description: getcollection
        call: hexa.getcollection
        with:
          collectionId: rest.collectionId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: editcollection
        description: editcollection
        call: hexa.editcollection
        with:
          collectionId: rest.collectionId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/data-connections
      name: v1-data-connections
      description: REST surface for v1-data-connections.
      operations:
      - method: GET
        name: listdataconnections
        description: listdataconnections
        call: hexa.listdataconnections
        with:
          after: rest.after
          before: rest.before
          limit: rest.limit
          sortBy: rest.sortBy
          sortDirection: rest.sortDirection
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdataconnection
        description: createdataconnection
        call: hexa.createdataconnection
        with:
          body: rest.body
        outputParameters:
