aid: hexa
name: Hex
description: >-
  Hex is an AI analytics platform that enables teams to explore, analyze, and
  share data insights together. It provides agentic notebooks, conversational
  self-serve analytics, data apps, dashboards, and a Context Studio for
  semantic modeling and data governance, integrating with major data
  warehouses such as Snowflake, BigQuery, Databricks, and Redshift.
